<svg class="gauge-svg" width="160" height="160" viewBox="0 0 220 220">
                        <defs>
                            <linearGradient id="blueGaugeGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                                <stop offset="0%" stop-color="#0041C2"/>
                                <stop offset="100%" stop-color="#73A6FB"/>
